name: Daily Report Smoke

on:
  workflow_dispatch:
    inputs:
      report_run_date:
        description: "Optional run date override in YYYY-MM-DD"
        required: false
        type: string

jobs:
  smoke-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: stockbot
          POSTGRES_PASSWORD: stockbot
          POSTGRES_DB: stockbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockbot -d stockbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://stockbot:stockbot@127.0.0.1:5432/stockbot
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER: google
      REPORT_RUN_DATE: ${{ inputs.report_run_date }}
      REPORT_TRIGGER_TYPE: workflow_dispatch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Apply schema
        run: psql "$DATABASE_URL" -f packages/database/drizzle/0000_init.sql

      - name: Seed default market watch catalog and mock portfolio
        run: |
          psql "$DATABASE_URL" <<'SQL'
          INSERT INTO market_watch_catalog_items (item_code, item_name, asset_type, source_key, is_default, sort_order)
          VALUES
            ('KOSPI', '코스피', 'index', 'index:KRX:KOSPI', true, 10),
            ('KOSDAQ', '코스닥', 'index', 'index:KRX:KOSDAQ', true, 20),
            ('NASDAQ', '나스닥 종합', 'index', 'index:NASDAQ:IXIC', true, 30),
            ('SP500', 'S&P 500', 'index', 'index:SP:SPX', true, 40),
            ('DOW', '다우', 'index', 'index:DJI', true, 50),
            ('WTI', '국제 유가 (WTI)', 'commodity', 'commodity:WTI', true, 60),
            ('HENRY_HUB_NATURAL_GAS', '천연가스 (Henry Hub)', 'commodity', 'commodity:HENRY_HUB_NATURAL_GAS', true, 70),
            ('COPPER', '구리', 'commodity', 'commodity:COPPER', true, 75),
            ('USD_KRW', 'USD/KRW 환율', 'fx', 'fx:USDKRW', true, 80),
            ('DXY', '달러인덱스', 'fx', 'index:DXY', true, 85),
            ('US10Y', '미국 10년물 국채금리', 'rate', 'rate:US10Y', true, 90),
            ('VIX', 'VIX', 'volatility', 'index:CBOE:VIX', true, 100)
          ON CONFLICT (item_code) DO UPDATE SET
            item_name = EXCLUDED.item_name,
            asset_type = EXCLUDED.asset_type,
            source_key = EXCLUDED.source_key,
            sort_order = EXCLUDED.sort_order,
            is_default = true,
            updated_at = now();

          INSERT INTO users (telegram_user_id, display_name, locale, timezone)
          VALUES ('github-actions-smoke', 'GitHub Smoke', 'ko-KR', 'Asia/Seoul')
          ON CONFLICT (telegram_user_id) DO UPDATE SET
            display_name = EXCLUDED.display_name,
            locale = EXCLUDED.locale,
            timezone = EXCLUDED.timezone,
            updated_at = now();

          WITH seeded_user AS (
            SELECT id FROM users WHERE telegram_user_id = 'github-actions-smoke'
          )
          INSERT INTO portfolio_holdings (user_id, symbol, exchange, company_name, avg_price, quantity)
          VALUES
            ((SELECT id FROM seeded_user), '005930', 'KR', '삼성전자', 188129, 27),
            ((SELECT id FROM seeded_user), '000660', 'KR', 'SK하이닉스', 947250, 7),
            ((SELECT id FROM seeded_user), '005380', 'KR', '현대차', 224500, 6),
            ((SELECT id FROM seeded_user), '086520', 'KQ', '에코프로', 152200, 10),
            ((SELECT id FROM seeded_user), '086280', 'KR', '현대글로비스', 224500, 6),
            ((SELECT id FROM seeded_user), '011200', 'KR', 'HMM', 21100, 100)
          ON CONFLICT (user_id, symbol, exchange) DO UPDATE SET
            company_name = EXCLUDED.company_name,
            avg_price = EXCLUDED.avg_price,
            quantity = EXCLUDED.quantity,
            updated_at = now();
          SQL

      - name: Run Gemini daily report smoke
        run: pnpm --filter @stock-chatbot/worker run run:daily-report

      - name: Print latest report run summary
        run: |
          psql "$DATABASE_URL" <<'SQL'
          SELECT run_date, schedule_type, status, left(report_text, 400) AS report_preview
          FROM report_runs
          ORDER BY started_at DESC
          LIMIT 1;
          SQL
