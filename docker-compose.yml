services:
  postgres:
    image: postgres:18.3
    container_name: stock-chatbot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockbot}
      POSTGRES_DB: ${POSTGRES_DB:-stockbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockbot} -d ${POSTGRES_DB:-stockbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6.0
    container_name: stock-chatbot-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: stock-chatbot-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD:-stockbot}@postgres:5432/${POSTGRES_DB:-stockbot}
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-replace-me}
    ports:
      - "3000:3000"

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: stock-chatbot-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD:-stockbot}@postgres:5432/${POSTGRES_DB:-stockbot}
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-replace-me}

volumes:
  postgres-data:
  redis-data:

